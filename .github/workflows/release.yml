name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: windows-latest
    env:
      WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
      GROK_SWITCH_SIGN_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Restore signing certificate
        if: env.WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "grok-switch-signing.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64)
          )
          "GROK_SWITCH_SIGN_CERT=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build, sign, and verify
        if: env.WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          .\build.ps1 -RequireSignature
          .\build-gui.ps1 -RequireSignature

      - name: Build unsigned fallback
        if: env.WINDOWS_SIGNING_CERT_BASE64 == ''
        shell: pwsh
        run: |
          Write-Warning "No code-signing certificate is configured; publishing an unsigned Windows build."
          .\build.ps1
          .\build-gui.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-switch-windows-x64
          path: |
            grok_switch.exe
            grok_switch.exe.sha256
            grok_switch_gui.exe
            grok_switch_gui.exe.sha256
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          gh release view $env:RELEASE_TAG 2>$null
          $releaseExists = $LASTEXITCODE -eq 0
          $PSNativeCommandUseErrorActionPreference = $true
          if (-not $releaseExists) {
            gh release create $env:RELEASE_TAG --verify-tag --generate-notes --title $env:RELEASE_TAG
          }
          gh release upload $env:RELEASE_TAG grok_switch.exe grok_switch.exe.sha256 grok_switch_gui.exe grok_switch_gui.exe.sha256 --clobber

      - name: Remove temporary certificate
        if: always()
        shell: pwsh
        run: |
          if ($env:GROK_SWITCH_SIGN_CERT -and (Test-Path -LiteralPath $env:GROK_SWITCH_SIGN_CERT)) {
            Remove-Item -LiteralPath $env:GROK_SWITCH_SIGN_CERT -Force
          }
